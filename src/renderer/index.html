<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Music Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="widget">

    <!-- Информация о треке -->
    <div class="track-info">
      <div class="track-name">Название трека</div>
      <div class="track-artist">Артист</div>
    </div>

    <!-- Кнопки управления -->
    <div class="controls">
      <button id="btn-prev">⏮</button>
      <button id="btn-play">⏸</button>
      <button id="btn-next">⏭</button>
      <button id="btn-like">🤍</button>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
